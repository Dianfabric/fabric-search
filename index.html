<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabric Price</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --bg: #faf9f7;
    --white: #ffffff;
    --cream: #f5f2ed;
    --border: #e8e3dc;
    --border2: #d4cdc4;
    --ink: #1c1a18;
    --ink2: #4a4540;
    --ink3: #8c857d;
    --ink4: #b8b0a8;
    --gold: #c8a96e;
    --gold-light: #f7f0e6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    font-weight: 300;
  }

  .header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink);
  }

  .brand-sub {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink3);
    font-weight: 300;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .social-links {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .social-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    background: var(--white);
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .social-btn:hover {
    border-color: var(--border2);
    background: var(--bg);
  }

  .social-btn svg {
    width: 15px;
    height: 15px;
    flex-shrink: 0;
  }

  .social-btn .tooltip {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--white);
    font-size: 9px;
    letter-spacing: 1px;
    white-space: nowrap;
    padding: 4px 8px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 200;
  }

  .social-btn:hover .tooltip { opacity: 1; }



  .search-area { padding-bottom: 14px; }

  .search-wrap {
    display: flex;
    align-items: flex-start;
    border: 1px solid var(--border2);
    background: var(--white);
  }

  .search-textarea {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px 16px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    color: var(--ink);
    outline: none;
    resize: none;
    line-height: 1.7;
    min-height: 44px;
    max-height: 120px;
    overflow-y: auto;
  }

  .search-textarea::placeholder { color: var(--ink4); font-size: 12px; }

  .search-btn {
    background: var(--ink);
    border: none;
    padding: 0 18px;
    align-self: stretch;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 52px;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .search-btn:active { background: var(--ink2); }

  .search-btn svg {
    width: 14px;
    height: 14px;
    stroke: #fff;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
  }

  .search-hint {
    font-size: 12px;
    letter-spacing: 0.5px;
    color: var(--ink4);
    margin-top: 7px;
    text-align: right;
  }

  .main { padding: 20px 24px; }

  .error-msg {
    display: none;
    background: #fdf2f2;
    border: 1px solid #f0d0d0;
    padding: 11px 14px;
    font-size: 12px;
    color: #a04040;
    margin-bottom: 14px;
  }

  .error-msg.active { display: block; }

  .loading { display: none; text-align: center; padding: 60px 20px; }
  .loading.active { display: block; }

  .loading-line {
    width: 40px;
    height: 1px;
    background: var(--border2);
    margin: 0 auto 16px;
    position: relative;
    overflow: hidden;
  }

  .loading-line::after {
    content: '';
    position: absolute;
    left: -100%;
    top: 0;
    width: 100%;
    height: 100%;
    background: var(--ink);
    animation: slide 1s ease-in-out infinite;
  }

  @keyframes slide { 0% { left: -100%; } 50% { left: 0%; } 100% { left: 100%; } }

  .loading-text {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink3);
  }

  .empty { display: none; text-align: center; padding: 60px 20px; }
  .empty.active { display: block; }

  .empty-line { width: 24px; height: 1px; background: var(--border2); margin: 0 auto 24px; }
  .empty-text { font-size: 20px; letter-spacing: 0.5px; color: var(--ink2); margin-bottom: 10px; }
  .empty-sub { font-size: 16px; letter-spacing: 0.5px; color: var(--ink3); }

  .welcome { text-align: center; padding: 16px 20px 40px; }

  .welcome-deco {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    color: var(--border);
    line-height: 1;
    margin-bottom: 12px;
  }

  .welcome-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--ink2);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .welcome-sub {
    font-size: 13px;
    letter-spacing: 0.5px;
    color: var(--ink3);
    line-height: 2;
  }

  /* 모바일 중간 사이즈 */
  @media (min-width: 480px) {
    .search-hint { font-size: 13px; }
    .empty-text { font-size: 15px; }
    .welcome-title { font-size: 26px; }
    .welcome-sub { font-size: 14px; }
  }

  /* PC */
  @media (min-width: 768px) {
    .header { padding: 0 48px; }
    .header-brand { padding: 40px 0 30px; margin-bottom: 24px; }
    .brand-name { font-size: 36px; letter-spacing: 8px; }
    .brand-sub { font-size: 14px; letter-spacing: 3px; margin-top: 6px; }
    .social-btn { width: 44px; height: 44px; border-radius: 8px; }
    .social-btn svg { width: 20px; height: 20px; }
    .search-area { padding-bottom: 28px; }
    .search-textarea { font-size: 16px; padding: 18px 24px; min-height: 62px; }
    .search-hint { font-size: 13px; margin-top: 12px; }
    .empty { padding: 100px 20px; }
    .empty-text { font-size: 26px; }
    .empty-sub { font-size: 20px; }
    .welcome { padding: 20px 20px 50px; }
    .welcome-deco { font-size: 72px; margin-bottom: 16px; }
    .welcome-title { font-size: 32px; margin-bottom: 16px; letter-spacing: 2px; }
    .welcome-sub { font-size: 15px; }
    .main { padding: 40px 48px; }
  }

  .summary-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .summary-text {
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--ink3);
  }

  .summary-text strong { color: var(--ink); font-weight: 500; }

  .clear-btn {
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ink4);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
  }

  .results-section { margin-bottom: 28px; }

  .section-keyword {
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink2);
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink3);
  }

  .no-result-row {
    padding: 16px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--ink4);
    border: 1px dashed var(--border);
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-left: 2px solid transparent;
    padding: 24px 24px 20px;
    margin-bottom: 0;
    transition: border-left-color 0.2s;
    position: relative;
  }

  .card:active { border-left-color: var(--gold); }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    padding: 6px 10px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink4);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }

  .copy-btn:hover { border-color: var(--ink3); color: var(--ink2); }
  .copy-btn.copied { border-color: #7ab87a; color: #7ab87a; }

  .card-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 14px;
    line-height: 1.5;
    letter-spacing: 0.3px;
  }

  .card-price-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }

  .card-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.5px;
  }

  .card-price-unit {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink3);
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .meta-item { display: flex; flex-direction: column; gap: 4px; }
  .meta-item.full { grid-column: unset; }

  .meta-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink3);
  }

  .meta-value {
    font-size: 14px;
    color: var(--ink);
    font-weight: 400;
  }
</style>
</head>

<script>
  const SHEET_NAME = '쇼룸단가표';
  let allData = [];

  function updateStatus(connected) {}

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.toggle('active', !!msg);
  }

  function showScreen(name) {
    document.getElementById('welcomeScreen').style.display = name === 'welcome' ? 'block' : 'none';
    document.getElementById('loadingScreen').classList.toggle('active', name === 'loading');
    document.getElementById('emptyScreen').classList.toggle('active', name === 'empty');
    document.getElementById('resultsScreen').style.display = name === 'results' ? 'block' : 'none';
  }

  function clearResults() {
    document.getElementById('searchInput').value = '';
    autoResize(document.getElementById('searchInput'));
    showScreen('welcome');
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  async function fetchAllData() {
    if (allData.length > 0) return allData;
    const res = await fetch(`/api/search?sheet=${encodeURIComponent(SHEET_NAME)}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allData = data.rows || [];
    return allData;
  }

  function extractFabricName(input) {
    return input.replace(/[\s\-#_]+\d{1,3}$/, '').trim();
  }

  async function doSearch() {
    const raw = document.getElementById('searchInput').value.trim();
    if (!raw) return;

    showError('');
    showScreen('loading');

    try {
      const rows = await fetchAllData();
      if (rows.length === 0) { showScreen('empty'); return; }

      const rawKeywords = raw.split(',').map(k => k.trim()).filter(k => k.length > 0);

      // 입력값 그대로 완전일치 먼저 확인, 없으면 컬러코드 제거 후 사용
      const keywords = rawKeywords.map(k => {
        const lower = k.toLowerCase();
        const hasExact = rows.some(row =>
          (row[0] || '').toLowerCase() === lower || (row[5] || '').toLowerCase() === lower
        );
        if (hasExact) return k;
        const extracted = extractFabricName(k);
        return extracted.length > 0 ? extracted : k;
      });

      const sections = keywords.map((keyword, i) => {
        const rawKeyword = rawKeywords[i];
        const lower = keyword.toLowerCase();
        const exact = rows.filter(row => {
          const nameA = (row[0] || '').toLowerCase();
          const nameF = (row[5] || '').toLowerCase();
          return nameA === lower || nameF === lower;
        });
        const exactSet = new Set(exact);
        const partial = rows.filter(row => {
          if (exactSet.has(row)) return false;
          const nameA = (row[0] || '').toLowerCase();
          const nameF = (row[5] || '').toLowerCase();
          return nameA.includes(lower) || nameF.includes(lower);
        }).slice(0, 5);
        return { keyword, rawKeyword, matched: [...exact, ...partial], exactCount: exact.length };
      });

      const totalFound = sections.reduce((sum, s) => sum + s.matched.length, 0);
      if (totalFound === 0) { showScreen('empty'); return; }

      document.getElementById('summaryText').innerHTML = keywords.length === 1
        ? `<strong>${totalFound}</strong>건 조회됨`
        : `<strong>${keywords.length}</strong>개 검색어 &nbsp;·&nbsp; <strong>${totalFound}</strong>건 조회됨`;

      document.getElementById('resultsList').innerHTML = sections.map(({ keyword, rawKeyword, matched, exactCount }) => {
        const cardsHtml = matched.length === 0
          ? `<div class="no-result-row">조회 결과 없음</div>`
          : matched.map((row, idx) => {
              const divider = (idx === exactCount && exactCount > 0 && matched.length > exactCount)
                ? `<div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink4);margin:14px 0 10px;padding-bottom:8px;border-bottom:1px dashed var(--border);">유사 결과</div>`
                : '';
              const name = row[0] || '-';
              const nameF = row[5] || '';
              const rawLower = rawKeyword.toLowerCase();
              const nameLower = name.toLowerCase();
              const nameFLower = nameF.toLowerCase();
              // rawKeyword가 A열 또는 F열을 포함하면 rawKeyword 사용, 아니면 카드명 사용
              const copyName = (rawLower.includes(nameLower) || (nameFLower && rawLower.includes(nameFLower))) ? rawKeyword : name;
              const price = row[1] || '';
              const material = row[2] || '';
              const width = row[3] || '';
              const weight = row[4] || '';
              const priceNum = price ? Number(price) : 0;
              const priceFormatted = priceNum ? priceNum.toLocaleString() : '-';

              // 폭 계산: 500 미만이면 ×10, 아니면 그대로
              const widthNum = width ? Number(String(width).replace(/[^0-9.]/g, '')) : 0;
              const widthM = widthNum ? (widthNum < 500 ? widthNum * 10 : widthNum) / 1000 : 0;

              // 폭 있으면 해당 폭으로 계산, 없으면 1400/2800 기준
              const hebeAuto = (priceNum && widthM) ? (Math.ceil(priceNum / (widthM * 0.9144) / 1000) * 1000).toLocaleString() : '-';
              const hebeSmall = priceNum ? (Math.ceil(priceNum / (1.4 * 0.9144) / 1000) * 1000).toLocaleString() : '-';
              const hebeLarge = priceNum ? (Math.ceil(priceNum / (2.8 * 0.9144) / 1000) * 1000).toLocaleString() : '-';
              const meterPrice = priceNum ? (Math.ceil(priceNum / 0.9144 / 1000) * 1000).toLocaleString() : '-';

              const hasWidth = widthNum > 0;

              const cardId = 'card_' + Math.random().toString(36).substr(2, 9);
              const priceId = 'price_' + Math.random().toString(36).substr(2, 9);
              const unitId = 'unit_' + Math.random().toString(36).substr(2, 9);
              const btnSmallId = 'btns_' + Math.random().toString(36).substr(2, 9);
              const btnLargeId = 'btnl_' + Math.random().toString(36).substr(2, 9);
              const btnMeterId = 'btnm_' + Math.random().toString(36).substr(2, 9);

              const copyText = `${copyName} ${priceFormatted}/Y`;
              const copyTextAuto = `${copyName} ${hebeAuto}/m2`;
              const copyTextSmall = `${copyName} ${hebeSmall}/m2`;
              const copyTextLarge = `${copyName} ${hebeLarge}/m2`;
              const copyTextMeter = `${copyName} ${meterPrice}/m`;

              let metaHtml = '';
              if (material) metaHtml += `<div class="meta-item full"><div class="meta-label">소재</div><div class="meta-value">${material}</div></div>`;
              if (width) metaHtml += `<div class="meta-item"><div class="meta-label">폭</div><div class="meta-value">${width}</div></div>`;
              if (weight) metaHtml += `<div class="meta-item"><div class="meta-label">무게</div><div class="meta-value">${weight} gsm</div></div>`;

              // 폭 있는 경우: 복사 + 헤베 + 미터 버튼
              const btnsWithWidth = `
                <button class="copy-btn" id="${cardId}" onclick="
                  var isHebe = document.getElementById('${btnSmallId}').textContent==='취소';
                  var isMeter = document.getElementById('${btnMeterId}').textContent==='취소';
                  var txt = isMeter ? '${copyTextMeter.replace(/'/g, "\\'")}' : isHebe ? '${copyTextAuto.replace(/'/g, "\\'")}' : '${copyText.replace(/'/g, "\\'")}';
                  copyCard('${cardId}', txt);
                  document.getElementById('${priceId}').textContent='${priceFormatted}';
                  document.getElementById('${unitId}').textContent='원 / Y';
                  document.getElementById('${btnSmallId}').textContent='헤베';
                  document.getElementById('${btnMeterId}').textContent='미터';
                  this.closest('.card').dataset.copytext='${copyText.replace(/'/g, "\\'")}';
                ">복사</button>
                <button class="copy-btn" id="${btnSmallId}" onclick="
                  var el=document.getElementById('${btnSmallId}');
                  if(el.textContent==='취소'){
                    document.getElementById('${priceId}').textContent='${priceFormatted}';
                    document.getElementById('${unitId}').textContent='원 / Y';
                    el.textContent='헤베';
                    document.getElementById('${btnMeterId}').textContent='미터';
                    this.closest('.card').dataset.copytext='${copyText.replace(/'/g, "\\'")}';
                  } else {
                    document.getElementById('${priceId}').textContent='${hebeAuto}';
                    document.getElementById('${unitId}').textContent='원 / m²';
                    el.textContent='취소';
                    document.getElementById('${btnMeterId}').textContent='미터';
                    this.closest('.card').dataset.copytext='${copyTextAuto.replace(/'/g, "\\'")}';
                  }
                ">헤베</button>
                <button class="copy-btn" id="${btnMeterId}" onclick="
                  var el=document.getElementById('${btnMeterId}');
                  if(el.textContent==='취소'){
                    document.getElementById('${priceId}').textContent='${priceFormatted}';
                    document.getElementById('${unitId}').textContent='원 / Y';
                    el.textContent='미터';
                    document.getElementById('${btnSmallId}').textContent='헤베';
                    this.closest('.card').dataset.copytext='${copyText.replace(/'/g, "\\'")}';
                  } else {
                    document.getElementById('${priceId}').textContent='${meterPrice}';
                    document.getElementById('${unitId}').textContent='원 / m';
                    el.textContent='취소';
                    document.getElementById('${btnSmallId}').textContent='헤베';
                    this.closest('.card').dataset.copytext='${copyTextMeter.replace(/'/g, "\\'")}';
                  }
                ">미터</button>`;

              // 폭 없는 경우: 복사 + 헤베(소폭) + 헤베(대폭) + 미터
              const btnsNoWidth = `
                <button class="copy-btn" id="${cardId}" onclick="
                  var isSmall = document.getElementById('${btnSmallId}').textContent==='취소';
                  var isLarge = document.getElementById('${btnLargeId}').textContent==='취소';
                  var isMeter = document.getElementById('${btnMeterId}').textContent==='취소';
                  var txt = isMeter ? '${copyTextMeter.replace(/'/g, "\\'")}' : isSmall ? '${copyTextSmall.replace(/'/g, "\\'")}' : isLarge ? '${copyTextLarge.replace(/'/g, "\\'")}' : '${copyText.replace(/'/g, "\\'")}';
                  copyCard('${cardId}', txt);
                  document.getElementById('${priceId}').textContent='${priceFormatted}';
                  document.getElementById('${unitId}').textContent='원 / Y';
                  document.getElementById('${btnSmallId}').textContent='헤베(소폭)';
                  document.getElementById('${btnLargeId}').textContent='헤베(대폭)';
                  document.getElementById('${btnMeterId}').textContent='미터';
                  this.closest('.card').dataset.copytext='${copyText.replace(/'/g, "\\'")}';
                ">복사</button>
                <button class="copy-btn" id="${btnSmallId}" onclick="
                  var el=document.getElementById('${btnSmallId}');
                  if(el.textContent==='취소'){
                    document.getElementById('${priceId}').textContent='${priceFormatted}';
                    document.getElementById('${unitId}').textContent='원 / Y';
                    el.textContent='헤베(소폭)';
                    document.getElementById('${btnLargeId}').textContent='헤베(대폭)';
                    document.getElementById('${btnMeterId}').textContent='미터';
                    this.closest('.card').dataset.copytext='${copyText.replace(/'/g, "\\'")}';
                  } else {
                    document.getElementById('${priceId}').textContent='${hebeSmall}';
                    document.getElementById('${unitId}').textContent='원 / m²';
                    el.textContent='취소';
                    document.getElementById('${btnLargeId}').textContent='헤베(대폭)';
                    document.getElementById('${btnMeterId}').textContent='미터';
                    this.closest('.card').dataset.copytext='${copyTextSmall.replace(/'/g, "\\'")}';
                  }
                ">헤베(소폭)</button>
                <button class="copy-btn" id="${btnLargeId}" onclick="
                  var el=document.getElementById('${btnLargeId}');
                  if(el.textContent==='취소'){
                    document.getElementById('${priceId}').textContent='${priceFormatted}';
                    document.getElementById('${unitId}').textContent='원 / Y';
                    el.textContent='헤베(대폭)';
                    document.getElementById('${btnSmallId}').textContent='헤베(소폭)';
                    document.getElementById('${btnMeterId}').textContent='미터';
                    this.closest('.card').dataset.copytext='${copyText.replace(/'/g, "\\'")}';
                  } else {
                    document.getElementById('${priceId}').textContent='${hebeLarge}';
                    document.getElementById('${unitId}').textContent='원 / m²';
                    el.textContent='취소';
                    document.getElementById('${btnSmallId}').textContent='헤베(소폭)';
                    document.getElementById('${btnMeterId}').textContent='미터';
                    this.closest('.card').dataset.copytext='${copyTextLarge.replace(/'/g, "\\'")}';
                  }
                ">헤베(대폭)</button>
                <button class="copy-btn" id="${btnMeterId}" onclick="
                  var el=document.getElementById('${btnMeterId}');
                  if(el.textContent==='취소'){
                    document.getElementById('${priceId}').textContent='${priceFormatted}';
                    document.getElementById('${unitId}').textContent='원 / Y';
                    el.textContent='미터';
                    document.getElementById('${btnSmallId}').textContent='헤베(소폭)';
                    document.getElementById('${btnLargeId}').textContent='헤베(대폭)';
                    this.closest('.card').dataset.copytext='${copyText.replace(/'/g, "\\'")}';
                  } else {
                    document.getElementById('${priceId}').textContent='${meterPrice}';
                    document.getElementById('${unitId}').textContent='원 / m';
                    el.textContent='취소';
                    document.getElementById('${btnSmallId}').textContent='헤베(소폭)';
                    document.getElementById('${btnLargeId}').textContent='헤베(대폭)';
                    this.closest('.card').dataset.copytext='${copyTextMeter.replace(/'/g, "\\'")}';
                  }
                ">미터</button>`;

              return divider + `<div class="card" data-copyid="${cardId}" data-copytext="${copyText.replace(/"/g, '&quot;')}" style="display:flex;gap:16px;align-items:stretch;">
                <div style="flex:1;min-width:0;">
                  <div class="card-name">${name}</div>
                  <div class="card-price-row">
                    <div class="card-price" id="${priceId}">${priceFormatted}</div>
                    <div class="card-price-unit" id="${unitId}">원 / Y</div>
                    <div style="font-size:10px;color:var(--ink4);letter-spacing:0.5px;margin-left:4px;">(부가세 별도)</div>
                  </div>
                  ${metaHtml ? `<div class="card-meta">${metaHtml}</div>` : ''}
                </div>
                <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;padding-top:2px;">
                  ${hasWidth ? btnsWithWidth : btnsNoWidth}
                </div>
              </div>`;
            }).join('');

        return `<div class="results-section"><div class="section-keyword"><span>${keyword}</span><span class="section-count">${matched.length}</span></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,480px),1fr));gap:12px;">${cardsHtml}</div></div>`;
      }).join('');


      showScreen('results');
    } catch (err) {
      showScreen('welcome');
      showError(`오류: ${err.message}`);
    }
  }

  function copyAll() {
    const cards = document.querySelectorAll('.card[data-copytext]');
    const lines = Array.from(cards).map(c => c.dataset.copytext).filter(Boolean);
    const text = lines.join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyAllBtn');
      btn.textContent = '완료';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '전체복사'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function copyCard(id, text) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(id);
      btn.textContent = '완료';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function copyText(text) {
    navigator.clipboard.writeText(text);
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSearch(); }
  });

  updateStatus(true);
</script>
</body>
</html>
