<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabric Price</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --bg: #faf9f7;
    --white: #ffffff;
    --cream: #f5f2ed;
    --border: #e8e3dc;
    --border2: #d4cdc4;
    --ink: #1c1a18;
    --ink2: #4a4540;
    --ink3: #8c857d;
    --ink4: #b8b0a8;
    --gold: #c8a96e;
    --gold-light: #f7f0e6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    font-weight: 300;
  }

  .header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink);
  }

  .brand-sub {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink3);
    font-weight: 300;
    margin-top: 2px;
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink3);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border2);
    transition: background 0.3s;
  }

  .dot.active { background: #7ab87a; }

  .search-area { padding-bottom: 14px; }

  .search-wrap {
    display: flex;
    align-items: flex-start;
    border: 1px solid var(--border2);
    background: var(--white);
  }

  .search-textarea {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px 16px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    color: var(--ink);
    outline: none;
    resize: none;
    line-height: 1.7;
    min-height: 44px;
    max-height: 120px;
    overflow-y: auto;
  }

  .search-textarea::placeholder { color: var(--ink4); font-size: 12px; }

  .search-btn {
    background: var(--ink);
    border: none;
    padding: 0 18px;
    align-self: stretch;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 52px;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .search-btn:active { background: var(--ink2); }

  .search-btn svg {
    width: 14px;
    height: 14px;
    stroke: #fff;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
  }

  .search-hint {
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--ink4);
    margin-top: 7px;
    text-align: right;
  }

  .setup-panel {
    margin: 16px 24px 0;
    border: 1px solid var(--border);
    background: var(--white);
  }

  .setup-header {
    padding: 13px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }

  .setup-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink3);
  }

  .setup-arrow {
    font-size: 10px;
    color: var(--ink4);
    transition: transform 0.2s;
  }

  .setup-arrow.open { transform: rotate(180deg); }

  .setup-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }

  .setup-body.open { display: block; }

  .setup-field { margin-top: 14px; }

  .setup-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 6px;
    display: block;
  }

  .setup-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 10px 12px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .setup-input:focus { border-color: var(--ink2); }

  .save-btn {
    margin-top: 16px;
    width: 100%;
    background: var(--ink);
    color: var(--white);
    border: none;
    padding: 12px;
    font-size: 10px;
    font-weight: 400;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  .save-btn:active { background: var(--ink2); }

  .main { padding: 20px 24px; }

  .error-msg {
    display: none;
    background: #fdf2f2;
    border: 1px solid #f0d0d0;
    padding: 11px 14px;
    font-size: 12px;
    color: #a04040;
    margin-bottom: 14px;
  }

  .error-msg.active { display: block; }

  .loading { display: none; text-align: center; padding: 60px 20px; }
  .loading.active { display: block; }

  .loading-line {
    width: 40px;
    height: 1px;
    background: var(--border2);
    margin: 0 auto 16px;
    position: relative;
    overflow: hidden;
  }

  .loading-line::after {
    content: '';
    position: absolute;
    left: -100%;
    top: 0;
    width: 100%;
    height: 100%;
    background: var(--ink);
    animation: slide 1s ease-in-out infinite;
  }

  @keyframes slide { 0% { left: -100%; } 50% { left: 0%; } 100% { left: 100%; } }

  .loading-text {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink3);
  }

  .empty { display: none; text-align: center; padding: 60px 20px; }
  .empty.active { display: block; }

  .empty-line { width: 24px; height: 1px; background: var(--border2); margin: 0 auto 16px; }
  .empty-text { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--ink3); }

  .welcome { text-align: center; padding: 60px 20px; }

  .welcome-deco {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    color: var(--border);
    line-height: 1;
    margin-bottom: 20px;
  }

  .welcome-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--ink2);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .welcome-sub {
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--ink3);
    line-height: 1.9;
  }

  .summary-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .summary-text {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink3);
  }

  .summary-text strong { color: var(--ink); font-weight: 400; }

  .clear-btn {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink4);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
  }

  .results-section { margin-bottom: 28px; }

  .section-keyword {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink4);
  }

  .no-result-row {
    padding: 16px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--ink4);
    border: 1px dashed var(--border);
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-left: 2px solid transparent;
    padding: 18px 18px 16px;
    margin-bottom: 8px;
    transition: border-left-color 0.2s;
    position: relative;
  }

  .card:active { border-left-color: var(--gold); }

  .copy-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    background: none;
    border: 1px solid var(--border);
    padding: 4px 8px;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink4);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.2s, color 0.2s;
  }

  .copy-btn:hover { border-color: var(--ink3); color: var(--ink2); }
  .copy-btn.copied { border-color: #7ab87a; color: #7ab87a; }

  .card-name {
    font-size: 14px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 12px;
    line-height: 1.5;
    letter-spacing: 0.3px;
  }

  .card-price-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .card-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.5px;
  }

  .card-price-unit {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink3);
  }

  .card-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .meta-item { display: flex; flex-direction: column; gap: 3px; }
  .meta-item.full { grid-column: 1 / -1; }

  .meta-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink4);
  }

  .meta-value {
    font-size: 12px;
    color: var(--ink2);
    font-weight: 300;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div>
      <div class="brand-name">Dian Fabric Price Search</div>
      <div class="brand-sub">디안 원단 단가 조회</div>
    </div>
    <div class="status-dot">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">오프라인</span>
    </div>
  </div>
  <div class="search-area">
    <div class="search-wrap">
      <textarea
        class="search-textarea"
        id="searchInput"
        placeholder="원단명 입력 — 여러 개는 쉼표로 구분 (예: HALO-005, HALO-010)"
        rows="1"
        oninput="autoResize(this)"
      ></textarea>
      <button class="search-btn" onclick="doSearch()">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <div class="search-hint">Enter — 검색 &nbsp;·&nbsp; 여러 개는 쉼표로 구분 (예: HALO-005, HALO-010)</div>
  </div>
</div>

<div class="setup-panel">
  <div class="setup-header" onclick="toggleSetup()">
    <span class="setup-title">API 설정</span>
    <span class="setup-arrow" id="setupArrow">▼</span>
  </div>
  <div class="setup-body" id="setupBody">
    <div class="setup-field">
      <label class="setup-label">API Key</label>
      <input class="setup-input" id="apiKeyInput" type="password" placeholder="AIzaSy..."/>
    </div>
    <div class="setup-field">
      <label class="setup-label">Spreadsheet ID</label>
      <input class="setup-input" id="sheetIdInput" type="text" placeholder="1oyIwn0jsUg..."/>
    </div>
    <div class="setup-field">
      <label class="setup-label">시트 이름</label>
      <input class="setup-input" id="sheetNameInput" type="text" placeholder="Sheet1"/>
    </div>
    <button class="save-btn" onclick="saveConfig()">저장</button>
  </div>
</div>

<div class="main">
  <div class="error-msg" id="errorMsg"></div>

  <div class="welcome" id="welcomeScreen">
    <div class="welcome-deco">✦</div>
    <div class="welcome-title">원단 단가 조회</div>
    <div class="welcome-sub">API 설정을 완료한 후 원단명을 입력해 단가를 조회하세요<br>여러 원단을 한 번에 검색할 수 있습니다</div>
  </div>

  <div class="loading" id="loadingScreen">
    <div class="loading-line"></div>
    <div class="loading-text">조회 중</div>
  </div>

  <div class="empty" id="emptyScreen">
    <div class="empty-line"></div>
    <div class="empty-text">결과 없음</div>
  </div>

  <div id="resultsScreen" style="display:none">
    <div class="summary-bar">
      <div class="summary-text" id="summaryText"></div>
      <button class="clear-btn" onclick="clearResults()">초기화</button>
    </div>
    <div id="resultsList"></div>
  </div>
</div>

<script>
  const CONFIG_KEY = 'fabric_search_config';
  let config = { apiKey: '', sheetId: '', sheetName: 'Sheet1' };
  let allData = [];

  function loadConfig() {
    try {
      const saved = localStorage.getItem(CONFIG_KEY);
      if (saved) {
        config = JSON.parse(saved);
        document.getElementById('apiKeyInput').value = config.apiKey || '';
        document.getElementById('sheetIdInput').value = config.sheetId || '';
        document.getElementById('sheetNameInput').value = config.sheetName || 'Sheet1';
        if (config.apiKey && config.sheetId) updateStatus(true);
      }
    } catch(e) {}
  }

  function saveConfig() {
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    const sheetId = document.getElementById('sheetIdInput').value.trim();
    const sheetName = document.getElementById('sheetNameInput').value.trim() || 'Sheet1';
    if (!apiKey || !sheetId) { showError('API Key와 Spreadsheet ID를 모두 입력해주세요.'); return; }
    config = { apiKey, sheetId, sheetName };
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
    allData = [];
    updateStatus(true);
    toggleSetup();
    showError('');
    document.getElementById('welcomeScreen').innerHTML = `
      <div class="welcome-deco">✦</div>
      <div class="welcome-title">연결 완료</div>
      <div class="welcome-sub">원단명을 입력해 단가를 조회하세요<br>여러 원단은 줄바꿈으로 구분하세요</div>
    `;
  }

  function updateStatus(connected) {
    document.getElementById('statusDot').classList.toggle('active', connected);
    document.getElementById('statusText').textContent = connected ? '온라인' : '오프라인';
  }

  function toggleSetup() {
    document.getElementById('setupBody').classList.toggle('open');
    document.getElementById('setupArrow').classList.toggle('open');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.toggle('active', !!msg);
  }

  function showScreen(name) {
    document.getElementById('welcomeScreen').style.display = name === 'welcome' ? 'block' : 'none';
    document.getElementById('loadingScreen').classList.toggle('active', name === 'loading');
    document.getElementById('emptyScreen').classList.toggle('active', name === 'empty');
    document.getElementById('resultsScreen').style.display = name === 'results' ? 'block' : 'none';
  }

  function clearResults() {
    document.getElementById('searchInput').value = '';
    autoResize(document.getElementById('searchInput'));
    showScreen('welcome');
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  async function fetchAllData() {
    if (allData.length > 0) return allData;
    const range = encodeURIComponent(`${config.sheetName}!A:E`);
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${config.sheetId}/values/${range}?key=${config.apiKey}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    allData = (data.values || []).slice(1);
    return allData;
  }

  async function doSearch() {
    const raw = document.getElementById('searchInput').value.trim();
    if (!raw) return;
    if (!config.apiKey || !config.sheetId) { showError('먼저 API 설정을 저장해주세요.'); toggleSetup(); return; }

    const keywords = raw.split(',').map(k => k.trim()).filter(k => k.length > 0);
    showError('');
    showScreen('loading');

    try {
      const rows = await fetchAllData();
      if (rows.length === 0) { showScreen('empty'); return; }

      const sections = keywords.map(keyword => {
        const lower = keyword.toLowerCase();
        return { keyword, matched: rows.filter(row => (row[0] || '').toLowerCase().includes(lower)) };
      });

      const totalFound = sections.reduce((sum, s) => sum + s.matched.length, 0);
      if (totalFound === 0) { showScreen('empty'); return; }

      document.getElementById('summaryText').innerHTML = keywords.length === 1
        ? `<strong>${totalFound}</strong>건 조회됨`
        : `<strong>${keywords.length}</strong>개 검색어 &nbsp;·&nbsp; <strong>${totalFound}</strong>건 조회됨`;

      document.getElementById('resultsList').innerHTML = sections.map(({ keyword, matched }) => {
        const cardsHtml = matched.length === 0
          ? `<div class="no-result-row">조회 결과 없음</div>`
          : matched.map(row => {
              const name = row[0] || '-';
              const price = row[1] || '';
              const material = row[2] || '';
              const width = row[3] || '';
              const weight = row[4] || '';
              const priceFormatted = price ? Number(price).toLocaleString() : '-';
              const copyText = [
                `제품명: ${name}`,
                `단가: ${priceFormatted}원/Y`,
                material ? `소재: ${material}` : '',
                width ? `폭: ${width}` : '',
                weight ? `무게: ${weight}gsm` : ''
              ].filter(Boolean).join('\n');
              let metaHtml = '';
              if (material) metaHtml += `<div class="meta-item full"><div class="meta-label">소재</div><div class="meta-value">${material}</div></div>`;
              if (width) metaHtml += `<div class="meta-item"><div class="meta-label">폭</div><div class="meta-value">${width}</div></div>`;
              if (weight) metaHtml += `<div class="meta-item"><div class="meta-label">무게</div><div class="meta-value">${weight} gsm</div></div>`;
              const cardId = 'card_' + Math.random().toString(36).substr(2, 9);
              return `<div class="card">
                <button class="copy-btn" id="${cardId}" onclick="copyCard('${cardId}', \`${copyText.replace(/`/g, "'")}\`)">복사</button>
                <div class="card-name">${name}</div>
                <div class="card-price-row"><div class="card-price">${priceFormatted}</div><div class="card-price-unit">원 / Y</div></div>
                ${metaHtml ? `<div class="card-meta">${metaHtml}</div>` : ''}
              </div>`;
            }).join('');

        return `<div class="results-section"><div class="section-keyword"><span>${keyword}</span><span class="section-count">${matched.length}</span></div>${cardsHtml}</div>`;
      }).join('');

      showScreen('results');
    } catch (err) {
      showScreen('welcome');
      showError(`오류: ${err.message}`);
    }
  }

  function copyCard(id, text) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(id);
      btn.textContent = '완료';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
    });
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSearch(); }
  });

  loadConfig();
  if (!config.apiKey) {
    document.getElementById('setupBody').classList.add('open');
    document.getElementById('setupArrow').classList.add('open');
  }
</script>
</body>
</html>
